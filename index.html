lex-wrap:wrap;margin-bottom:12px}.flash-wrap{display:grid;grid-template-columns:280px 1fr;gap:12px}.flash-list{padding:8px;max-height:620px;overflow:auto}.flash-list button{text-align:left;width:100%;height:auto;margin-bottom:6px;white-space:normal}.flash{min-height:360px;padding:24px;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}.flash .label{color:var(--muted);font-weight:900;text-transform:uppercase;font-size:12px;letter-spacing:.8px}.flash h3{font-size:26px;margin:12px 0}.flash p{font-size:17px;max-width:720px}.hidden{filter:blur(7px);user-select:none}.formula{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px}.formula article{border:1px solid var(--line);border-radius:8px;padding:12px;background:#fff}.formula h3{margin:0 0 7px;font-size:15px}.formula code{background:#eef2f7;padding:2px 6px;border-radius:5px}.view.formula{display:none}.view.formula.active{display:grid}#menuBtn{display:none}@media(max-width:980px){main{grid-template-columns:1fr}.side{position:static}.formula{grid-template-columns:repeat(2,1fr)}.mapgrid{grid-template-columns:1fr}.flash-wrap{grid-template-columns:1fr}.flash-list{max-height:none;display:grid;grid-template-columns:repeat(2,1fr);gap:6px}.flash-list button{margin:0}}@media(max-width:700px){header{display:none}.top{padding:11px 10px}.exam-note{display:none}main{padding:9px;gap:9px}.side{display:none}.tabs{display:grid;grid-template-columns:1fr 1fr}.select{grid-column:1/-1;width:100%;min-width:0;font-size:16px}.tabs button{width:100%;white-space:normal}.qbox{padding:12px}.qtext{font-size:14px}.opt{font-size:13px;grid-template-columns:22px 1fr;min-height:44px}.mapgrid,.formula,.flash-list{grid-template-columns:1fr}.flash{min-height:300px;padding:16px}.flash h3{font-size:22px}.actions{position:sticky;bottom:0;background:rgba(245,247,251,.96);padding:8px;margin:12px -12px -12px;border-top:1px solid var(--line)}#menuBtn{display:block;width:44px;min-width:44px;padding:8px 0}.tabs{position:sticky;top:6px;z-index:20;box-shadow:0 8px 24px rgba(30,42,70,.10);align-items:center}.tabs.collapsed{display:inline-flex;grid-template-columns:none;width:56px;max-width:56px;padding:6px;border-radius:8px}.tabs.collapsed>*:not(#menuBtn){display:none!important}.tabs:not(.collapsed){grid-template-columns:1fr 1fr}}
</style></head><body><header><div class="top"><h1><span>KU Leuven · Business Analysis + BPM</span>刷题网站 · 每份课件 20 题 · 含原题解析</h1><div class="exam-note">已按 BA/BPM 两板块重整：7 份 BA/guest deck + 14 份 BPM/exercise deck，共 420 题。Closing Session 样题和练习题已标注为原题/原练习；进度保存在本机浏览器。</div></div></header><main><aside class="side"><div class="card"><div class="head">学习统计</div><div id="stats"></div></div><div class="card"><div class="head">每份课件</div><div class="nav" id="chapterNav"></div></div></aside><section class="content"><div class="panel tabs collapsed" id="topControls"><button id="menuBtn" type="button">☰</button><select id="chapterSelect" class="select"></select><button id="allBtn">全部</button><button id="baBtn">BA 板块</button><button id="bpmBtn">BPM 板块</button><button class="primary" data-view="practice">刷题</button><button data-view="map">知识地图</button><button data-view="flash">闪卡</button><button data-view="formula">公式总表</button><button id="examBtn">模拟考试 30 题</button><button id="origBtn">原题专项</button><button id="wrongBtn">错题本</button><button id="resetBtn">清空进度</button></div><div id="practice" class="view active"><div class="panel section"><h2 id="modeTitle"></h2><p id="modeHint"></p></div><div class="panel progress"><div class="progline"><span id="progText"></span><span id="progPct"></span></div><div class="track"><div id="progFill" class="fill"></div></div></div><div id="score" class="panel score"></div><div id="quiz"></div></div><div id="map" class="view panel map"><div class="section" style="padding:0 0 14px"><h2>知识地图</h2><p>可展开到每份课件：每章 20 个小知识点、公式/规则、原题/原练习定位都放在同一张地图里。</p></div><div class="mapgrid" id="mapGrid"></div></div><div id="flash" class="view"><div class="flash-wrap"><div class="panel flash-list" id="flashList"></div><div class="panel flash" id="flashCard"></div></div></div><div id="formula" class="view panel formula"></div></section></main><script>const CHAPTERS = [{"id": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis"}, {"id": "BA2", "block": "BA", "label": "BA2 · Context Analysis"}, {"id": "BA3", "block": "BA", "label": "BA3 · Requirements Engineering"}, {"id": "BA4", "block": "BA", "label": "BA4 · Delivery & Project Management"}, {"id": "BA_AE", "block": "BA", "label": "Guest · Analysis in Real Life (AE)"}, {"id": "BA_EMP", "block": "BA", "label": "Guest · The Empathy Edge"}, {"id": "BA_PAN", "block": "BA", "label": "Guest · Panenco Product Development"}, {"id": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM"}, {"id": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling"}, {"id": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling"}, {"id": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling"}, {"id": "BPM5", "block": "BPM", "label": "BPM5 · Verification, Validation & Certification"}, {"id": "BPM6", "block": "BPM", "label": "BPM6 · Decision Modelling with DMN"}, {"id": "BPM7", "block": "BPM", "label": "BPM7 · Qualitative Process Analysis"}, {"id": "BPM8", "block": "BPM", "label": "BPM8 · Quantitative Process Analysis"}, {"id": "BPM9", "block": "BPM", "label": "BPM9 · Process Redesign"}, {"id": "BPM10", "block": "BPM", "label": "BPM10 · Process Automation"}, {"id": "BPM11", "block": "BPM", "label": "BPM11 · Process Discovery"}, {"id": "BPM12", "block": "BPM", "label": "BPM12 · Conformance Checking"}, {"id": "BPM12EX", "block": "BPM", "label": "BPM12 · Conformance Exercises"}, {"id": "BPM13", "block": "BPM", "label": "BPM13 · Extension & Tooling"}];
const QB = [{"id": 0, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "原题 · Closing Session", "q": "【原题】Which statement about Business Analysis Planning and Monitoring is FALSE?", "opts": ["RACI/RASCI helps assess and assign responsibility levels.", "Strategy competencies are largely useless for a business analyst.", "BABOK is a body of concepts, methods, activities and principles, not one fixed methodology.", "Stakeholder matrices typically use influence/power and impact/interest dimensions."], "ans": 1, "exp": "策略能力对 BA 很重要；说 largely useless 是错误的。"}, {"id": 1, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "Business analysis 的 BABOK 定义最接近哪一项？", "opts": ["通过定义需求并推荐解决方案来促成变革、为利益相关者交付价值", "只负责软件编码和界面实现", "用于替代利益相关者沟通", "只在项目结束后才使用"], "ans": 0, "exp": "BA 的核心是 enable change and deliver value。"}, {"id": 2, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "为什么数字化推动了 Business Analysis 的重要性？", "opts": ["只负责软件编码和界面实现", "业务流程数字化提高复杂度，需要把 IT 能力与业务目标对齐", "用于替代利益相关者沟通", "只在项目结束后才使用"], "ans": 1, "exp": "课件强调 digitization/digitalization 使 BA 成为业务与 IT 的桥梁。"}, {"id": 3, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "Business Analyst 最典型的角色是？", "opts": ["只负责软件编码和界面实现", "用于替代利益相关者沟通", "在利益相关者之间担任联络者，获取、分析、沟通并验证需求", "只在项目结束后才使用"], "ans": 2, "exp": "BA 是 liaison among stakeholders。"}, {"id": 4, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "BABOK 的正确定位是？", "opts": ["只负责软件编码和界面实现", "用于替代利益相关者沟通", "只在项目结束后才使用", "BA 职业领域的知识体系和标准概念集合，而不是单一项目方法论"], "ans": 3, "exp": "BABOK = Business Analysis Body of Knowledge。"}, {"id": 5, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "BA Planning and Monitoring 主要规划什么？", "opts": ["BA 方法、活动、沟通、治理、风险和 stakeholder engagement", "只负责软件编码和界面实现", "用于替代利益相关者沟通", "只在项目结束后才使用"], "ans": 0, "exp": "它规划 BA 工作本身如何开展。"}, {"id": 6, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "Stakeholder 在 BA 中指什么？", "opts": ["只负责软件编码和界面实现", "与变革或解决方案有关系、受影响或能影响结果的人或群体", "用于替代利益相关者沟通", "只在项目结束后才使用"], "ans": 1, "exp": "不仅是直接用户，家庭成员等间接受影响者也可能是 stakeholder。"}, {"id": 7, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "Stakeholder engagement 的主要价值是？", "opts": ["只负责软件编码和界面实现", "用于替代利益相关者沟通", "提升需求质量、参与度、满意度并减少阻力", "只在项目结束后才使用"], "ans": 2, "exp": "参与越好，误解和后期返工通常越少。"}, {"id": 8, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "Stakeholder matrix 常用哪两个维度？", "opts": ["只负责软件编码和界面实现", "用于替代利益相关者沟通", "只在项目结束后才使用", "影响力/权力与受影响程度/兴趣"], "ans": 3, "exp": "用于决定 manage closely、keep satisfied 等策略。"}, {"id": 9, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "Stakeholder onion diagram 的作用是？", "opts": ["用同心圆识别不同距离和层级的相关利益者", "只负责软件编码和界面实现", "用于替代利益相关者沟通", "只在项目结束后才使用"], "ans": 0, "exp": "帮助避免遗漏外部单位、部门、用户群。"}, {"id": 10, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "RACI 中 Responsible 表示？", "opts": ["只负责软件编码和界面实现", "实际执行工作的人", "用于替代利益相关者沟通", "只在项目结束后才使用"], "ans": 1, "exp": "Accountable 才是最终负责/签字者。"}, {"id": 11, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "RASCI 中 Support 表示？", "opts": ["只负责软件编码和界面实现", "用于替代利益相关者沟通", "协助 Responsible 完成工作的人或角色", "只在项目结束后才使用"], "ans": 2, "exp": "RASCI 比 RACI 多出支持角色。"}, {"id": 12, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "Communication plan 为什么重要？", "opts": ["只负责软件编码和界面实现", "用于替代利益相关者沟通", "只在项目结束后才使用", "不同 stakeholder 需要不同内容、频率和沟通渠道"], "ans": 3, "exp": "有效沟通是 stakeholder management 的核心。"}, {"id": 13, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "Predictive BA approach 更适合什么情境？", "opts": ["需求和环境较稳定、可提前规划的项目", "只负责软件编码和界面实现", "用于替代利益相关者沟通", "只在项目结束后才使用"], "ans": 0, "exp": "Adaptive approach 更适合变化大和探索性强的情境。"}, {"id": 14, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "Adaptive BA approach 的特点是？", "opts": ["只负责软件编码和界面实现", "迭代学习、持续反馈并根据变化调整需求和方案", "用于替代利益相关者沟通", "只在项目结束后才使用"], "ans": 1, "exp": "适合不确定性高的项目。"}, {"id": 15, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "BA 工作中 scope 明确性的主要作用是？", "opts": ["只负责软件编码和界面实现", "用于替代利益相关者沟通", "避免范围蔓延和利益相关者期望不一致", "只在项目结束后才使用"], "ans": 2, "exp": "Scope 说明包括什么和不包括什么。"}, {"id": 16, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "BA competency 指什么？", "opts": ["只负责软件编码和界面实现", "用于替代利益相关者沟通", "只在项目结束后才使用", "应用相关知识、技能和行为以有效完成 BA 工作的能力"], "ans": 3, "exp": "不仅是知识，还包括可应用能力。"}, {"id": 17, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "BA 关注 solution 的原因是？", "opts": ["确认方案确实满足业务需要并创造价值", "只负责软件编码和界面实现", "用于替代利益相关者沟通", "只在项目结束后才使用"], "ans": 0, "exp": "BA 不只收集需求，还要评估 solution fit。"}, {"id": 18, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "End users 在 BA 中为什么关键？", "opts": ["只负责软件编码和界面实现", "他们实际使用解决方案，其接受度决定价值能否实现", "用于替代利益相关者沟通", "只在项目结束后才使用"], "ans": 1, "exp": "用户参与有助于发现真实需要。"}, {"id": 19, "ch": "BA1", "block": "BA", "label": "BA1 · Introduction to Business Analysis", "source": "课件题", "q": "BA 的 “what” 与 IT 的 “how” 如何区分？", "opts": ["只负责软件编码和界面实现", "用于替代利益相关者沟通", "BA 主要定义业务需要和系统应做什么，技术团队决定如何实现", "只在项目结束后才使用"], "ans": 2, "exp": "这也是 BA 连接业务和 IT 的边界。"}, {"id": 20, "ch": "BA2", "block": "BA", "label": "BA2 · Context Analysis", "source": "课件题", "q": "Strategy 在 BA 语境中的作用是什么？", "opts": ["只负责软件编码和界面实现", "用于替代利益相关者沟通", "只在项目结束后才使用", "帮助判断变革和需求是否与组织目标一致"], "ans exp": "不同于一次性内部工具。"}, {"id": 139, "ch": "BA_PAN", "block": "BA", "label": "Guest · Panenco Product Development", "source": "课件题", "q": "产品开发从 BA 角度最重要的闭环是什么？", "opts": ["只负责软件编码和界面实现", "假设、构建、反馈、学习和调整", "用于替代利益相关者沟通", "只在项目结束后才使用"], "ans": 1, "exp": "贯穿 MVP 到 scale。"}, {"id": 140, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "Business Process Management 的核心关注是什么？", "opts": ["识别、发现、分析、改进、实施、监控和控制业务流程", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "BPM 是流程生命周期管理。"}, {"id": 141, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "Business process 最准确的定义是？", "opts": ["用于描述组织战略口号", "相关事件、活动和决策的集合，涉及参与者和对象并产生价值结果", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "流程是端到端价值流。"}, {"id": 142, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "Event、activity、decision 的区别是？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "event 表示发生的事，activity 是工作，decision 根据条件选择路径", "表示利益相关者权力矩阵"], "ans": 2, "exp": "三者共同构成流程。"}, {"id": 143, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "Process outcome 指什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "流程执行后为客户或组织产生的结果"], "ans": 3, "exp": "不是单个任务的局部输出。"}, {"id": 144, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "Primary process 的特点是？", "opts": ["直接为外部客户创造价值", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "区别于 support 和 management processes。"}, {"id": 145, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "Support process 的作用是？", "opts": ["用于描述组织战略口号", "支持核心流程运行，但通常不直接面向外部客户价值", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "如 HR、IT 支持。"}, {"id": 146, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "Management process 的作用是？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "规划、监控和控制组织或流程绩效", "表示利益相关者权力矩阵"], "ans": 2, "exp": "如战略和治理流程。"}, {"id": 147, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "Order-to-cash 属于哪类流程示例？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "端到端核心业务流程"], "ans": 3, "exp": "从订单到收款。"}, {"id": 148, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "BPM lifecycle 通常包括哪些阶段？", "opts": ["process identification, discovery, analysis, redesign, implementation, monitoring/control", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "课程后续 BPM1-13 基本沿此展开。"}, {"id": 149, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "Process architecture 的作用是什么？", "opts": ["用于描述组织战略口号", "展示组织流程之间的结构和关系", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "帮助识别和管理流程组合。"}, {"id": 150, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "As-is model 表示什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "现实中当前流程如何运行", "表示利益相关者权力矩阵"], "ans": 2, "exp": "用于发现问题。"}, {"id": 151, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "To-be model 表示什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "设计后的目标流程"], "ans": 3, "exp": "用于改进和实施。"}, {"id": 152, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "BPM 与 BA 的交集在哪里？", "opts": ["都关注业务价值、需求、流程和变革", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "BA 可以使用 BPM 技术进行分析。"}, {"id": 153, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "流程分类练习的价值是什么？", "opts": ["用于描述组织战略口号", "训练区分 primary、support 和 management processes", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "有助于理解流程目标。"}, {"id": 154, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "为什么流程视角不同于职能视角？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "流程跨越部门，关注端到端客户价值", "表示利益相关者权力矩阵"], "ans": 2, "exp": "职能视角容易形成局部优化。"}, {"id": 155, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "流程 KPI 通常衡量什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "时间、成本、质量、灵活性和合规等绩效维度"], "ans": 3, "exp": "后续定量/定性分析会细化。"}, {"id": 156, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "流程所有者 process owner 负责什么？", "opts": ["端到端流程绩效和改进协调", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "不只管单个部门任务。"}, {"id": 157, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "BPM 项目为何需要 stakeholder involvement？", "opts": ["用于描述组织战略口号", "流程跨角色，必须理解不同参与者目标和约束", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "否则模型和改进难落地。"}, {"id": 158, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "流程发现 process discovery 的目标是什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "理解和记录当前流程", "表示利益相关者权力矩阵"], "ans": 2, "exp": "可通过访谈、文档、观察或事件日志。"}, {"id": 159, "ch": "BPM1", "block": "BPM", "label": "BPM1 · Introduction to BPM", "source": "课件题", "q": "流程改进 redesign 与 automation 的关系是？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "应先判断流程是否需要重新设计，再决定是否自动化"], "ans": 3, "exp": "不要自动化不必要的流程。"}, {"id": 160, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "BPMN 中 start event 表示什么？", "opts": ["流程实例的触发和开始", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "通常建议一个清晰开始。"}, {"id": 161, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "BPMN 中 end event 表示什么？", "opts": ["用于描述组织战略口号", "流程路径或实例的结束结果", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "结束事件可有不同类型。"}, {"id": 162, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Sequence flow 表示什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "同一流程内部活动、事件和网关之间的控制流顺序", "表示利益相关者权力矩阵"], "ans": 2, "exp": "不同于 message flow。"}, {"id": 163, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Exclusive gateway (XOR) 表示什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "根据条件选择一个路径"], "ans": 3, "exp": "不是并行。"}, {"id": 164, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Parallel gateway (AND) split 表示什么？", "opts": ["同时激活所有外出分支", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "join 时通常同步所有进入分支。"}, {"id": 165, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Parallel gateway join 的语义是？", "opts": ["用于描述组织战略口号", "等待所有需要的分支到达后继续", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "防止过早继续。"}, {"id": 166, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Inclusive gateway (OR) 表示什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "可选择一个或多个满足条件的分支", "表示利益相关者权力矩阵"], "ans": 2, "exp": "比 XOR 灵活，比 AND 少强制。"}, {"id": 167, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Event-based gateway 与 data-based XOR 的区别是？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "前者由先发生的事件决定路径，后者由数据条件决定"], "ans": 3, "exp": "常用于等待消息/时间事件。"}, {"id": 168, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Task label 的良好实践是什么？", "opts": ["使用 verb-object 动宾结构", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "提高可理解性。"}, {"id": 169, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Pool 通常表示什么？", "opts": ["用于描述组织战略口号", "一个参与方或组织边界", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "不同 pool 之间用 message flow 通信。"}, {"id": 170, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Lane 通常表示什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "同一 pool 内的角色、部门或职责划分", "表示利益相关者权力矩阵"], "ans": 2, "exp": "帮助表达责任。"}, {"id": 171, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Message flow 用于什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "不同参与方之间的通信或消息交换"], "ans": 3, "exp": "不用于同一 pool 内的控制流。"}, {"id": 172, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Data object 在 BPMN 中表示什么？", "opts": ["活动使用或产生的信息对象", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "可帮助理解输入输出。"}, {"id": 173, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Intermediate event 的作用是？", "opts": ["用于描述组织战略口号", "表示流程执行中发生、等待或抛出的事件", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "如 message、timer。"}, {"id": 174, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Timer event 表示什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "时间点、持续时间或超时条件", "表示利益相关者权力矩阵"], "ans": 2, "exp": "常用于等待和超时。"}, {"id": 175, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Workflow net 中 place 和 transition 分别表示？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "place 表示状态/条件，transition 表示活动/事件发生"], "ans": 3, "exp": "Petri net 用 token 表示状态。"}, {"id": 176, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Marking 在 Petri net 中表示什么？", "opts": ["token 在各 place 上的分布", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "决定哪些 transition enabled。"}, {"id": 177, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Transition enabled 的条件是？", "opts": ["用于描述组织战略口号", "其所有输入 place 都有足够 token", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "enabled 后可 fire。"}, {"id": 178, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "Firing transition 会发生什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "消耗输入 place token 并在输出 place 产生 token", "表示利益相关者权力矩阵"], "ans": 2, "exp": "用于模拟流程执行。"}, {"id": 179, "ch": "BPM2", "block": "BPM", "label": "BPM2 · Essential Process Modelling", "source": "课件题", "q": "BPMN 基础建模中最常见的错误是什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "混淆控制流、消息流、网关语义和事件类型"], "ans": 3, "exp": "这些会导致模型不可读或不正确。"}, {"id": 180, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "原题 · Closing Session", "q": "【原题】Given the BPMN-model, which statement is FALSE?", "opts": ["Subprocess B is a compensation subprocess triggered by end event Canceled and rolls back subprocess A.", "A timer boundary event on Handle Order models a timeout and interrupts if it takes longer than two weeks.", "Activities C and D can execute more than once and have no control-flow dependency with subprocess A.", "The model is syntactically incorrect because expanded subprocess Handle Order lacks at least one start and one end event."], "ans": 3, "exp": "Expanded subprocess 不一定必须显式至少一个 start 和 end event；D 是 false。"}, {"id": 181, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Advanced BPMN 中 boundary event 附着在哪里？", "opts": ["用于描述组织战略口号", "附着在 activity/subprocess 边界上，表示执行期间可能发生的事件", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "可中断或非中断。"}, {"id": 182, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Interrupting boundary event 的效果是？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "触发后取消所附活动并沿边界路径继续", "表示利益相关者权力矩阵"], "ans": 2, "exp": "非中断则不会取消活动。"}, {"id": 183, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Non-interrupting boundary event 的效果是？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "触发后保留原活动，同时启动额外路径"], "ans": 3, "exp": "常用于提醒或并行处理。"}, {"id": 184, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Error boundary event 通常用于什么？", "opts": ["捕获活动或 subprocess 中发生的业务/技术错误", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "触发异常处理。"}, {"id": 185, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Escalation event 与 error event 的区别是？", "opts": ["用于描述组织战略口号", "escalation 可表示需要上报但不一定失败终止", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "error 更偏错误处理。"}, {"id": 186, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Compensation subprocess 的作用是什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "撤销或补偿已经完成的工作", "表示利益相关者权力矩阵"], "ans": 2, "exp": "例如订单取消后回滚子流程。"}, {"id": 187, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Transaction subprocess 适合表达什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "一组需要整体成功、取消或补偿的活动"], "ans": 3, "exp": "支持 cancel/compensation 语义。"}, {"id": 188, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Event subprocess 的特点是？", "opts": ["由事件触发，可在父流程上下文中启动", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "可用于异常或额外处理。"}, {"id": 189, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Ad-hoc subprocess 表示什么？", "opts": ["用于描述组织战略口号", "内部活动没有严格预定义顺序，可按需要执行", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "适合知识工作或灵活处理。"}, {"id": 190, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Multi-instance activity 表示什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "同一活动对多个对象或参与者重复执行", "表示利益相关者权力矩阵"], "ans": 2, "exp": "可顺序或并行。"}, {"id": 191, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Loop activity 与 multi-instance 的区别是？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "loop 是同一活动按条件重复，multi-instance 是多个实例"], "ans": 3, "exp": "语义不同。"}, {"id": 192, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Signal event 与 message event 的区别是？", "opts": ["signal 是广播，message 通常点对点", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "BPMN 中两者通信语义不同。"}, {"id": 193, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Terminate end event 的作用是？", "opts": ["用于描述组织战略口号", "立即终止整个流程实例并清除 token", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "强于普通 end event。"}, {"id": 194, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Link event 的用途是什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "在同一流程图中连接远距离位置以减少线条混乱", "表示利益相关者权力矩阵"], "ans": 2, "exp": "不能跨 pool 通信。"}, {"id": 195, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Subprocess 展开/折叠的主要好处是什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "用层级结构管理复杂度"], "ans": 3, "exp": "支持从概览到细节。"}, {"id": 196, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Advanced modelling 中为什么要谨慎使用复杂事件？", "opts": ["过多高级符号会降低 pragmatic quality", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "模型应服务理解。"}, {"id": 197, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Boundary timer 常用于表达什么？", "opts": ["用于描述组织战略口号", "活动超时、等待时间限制或 SLA 触发", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "例如超过两周则中断。"}, {"id": 198, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "Compensation handler 何时被触发？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "当已完成活动需要被补偿时由 compensation event 触发", "表示利益相关者权力矩阵"], "ans": 2, "exp": "不是普通顺序流直接进入。"}, {"id": 199, "ch": "BPM3", "block": "BPM", "label": "BPM3 · Advanced Process Modelling", "source": "课件题", "q": "高级 BPMN 建模的核心风险是？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "语法正确但读者难以理解或语义被误用"], "ans": 3, "exp": "需要平衡表达力和清晰度。"}, {"id": 200, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "原题 · Closing Session", "q": "【原题】Given a small Declare model, which case is not compliant with the model?", "opts": ["ABBC", "CBBA", "AAA", "CCC"], "ans": 1, "exp": "答案为 CBBA。Declare 约束组合下该 trace 违反模型。"}, {"id": 201, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Declarative process modelling 与 imperative modelling 的核心差异是？", "opts": ["用于描述组织战略口号", "声明式模型描述必须满足的约束，而不是完整规定所有控制流", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "适合灵活流程。"}, {"id": 202, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Declare 模型由什么组成？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "活动和它们之间的约束 templates", "表示利益相关者权力矩阵"], "ans": 2, "exp": "如 response、precedence、succession。"}, {"id": 203, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Response(A,B) 的含义是？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "每次 A 发生后，之后必须发生 B"], "ans": 3, "exp": "B 不一定紧跟 A。"}, {"id": 204, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Precedence(A,B) 的含义是？", "opts": ["B 发生前必须已经发生 A", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "A 是 B 的前置条件。"}, {"id": 205, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Succession(A,B) 结合了什么？", "opts": ["用于描述组织战略口号", "Response(A,B) 和 Precedence(A,B)", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "A 后要有 B，B 前要有 A。"}, {"id": 206, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Absence constraint 表示什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "某活动最多允许发生指定次数或不允许发生", "表示利益相关者权力矩阵"], "ans": 2, "exp": "限制活动出现。"}, {"id": 207, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Existence constraint 表示什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "某活动至少需要发生指定次数"], "ans": 3, "exp": "要求活动出现。"}, {"id": 208, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Choice constraint 表示什么？", "opts": ["一组活动中至少发生一个", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "表达可选但至少一项。"}, {"id": 209, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Exclusive choice 表示什么？", "opts": ["用于描述组织战略口号", "两个活动中恰好一个发生", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "不能都发生也不能都不发生。"}, {"id": 210, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Co-existence(A,B) 表示什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "A 发生当且仅当 B 也发生", "表示利益相关者权力矩阵"], "ans": 2, "exp": "关注共同出现。"}, {"id": 211, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Not co-existence 表示什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "两个活动不能在同一 case 中共同发生"], "ans": 3, "exp": "表达互斥。"}, {"id": 212, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Chain response(A,B) 与 response(A,B) 区别是？", "opts": ["chain response 要求 A 后立即发生 B", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "response 只要求之后某时发生。"}, {"id": 213, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Declarative modelling 适合什么流程？", "opts": ["用于描述组织战略口号", "知识密集、灵活、可变路径多的流程", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "如医疗、案例管理。"}, {"id": 214, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "声明式模型的优势是？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "允许所有未被禁止的行为，模型更灵活", "表示利益相关者权力矩阵"], "ans": 2, "exp": "适合少量规则约束大量行为。"}, {"id": 215, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "声明式模型的挑战是？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "多个约束组合后不易直观理解所有允许行为"], "ans": 3, "exp": "需要认真检查合规性。"}, {"id": 216, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Trace compliance 检查什么？", "opts": ["某个执行序列是否满足所有 Declare 约束", "用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 0, "exp": "常用于 conformance reasoning。"}, {"id": 217, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Activation 在 Declare 中指什么？", "opts": ["用于描述组织战略口号", "触发某个约束需要被满足的事件发生", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "如 response 中 A 是 activation。"}, {"id": 218, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "Target 在 Declare 中指什么？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "用于满足约束的事件或活动", "表示利益相关者权力矩阵"], "ans": 2, "exp": "如 response 中 B 是 target。"}, {"id": 219, "ch": "BPM4", "block": "BPM", "label": "BPM4 · Declarative Process Modelling", "source": "课件题", "q": "为什么 declarative modelling 可与 process mining 相关？", "opts": ["用于描述组织战略口号", "只用于替代事件日志", "表示利益相关者权力矩阵", "可用事件日志检查 traces 是否满足约束"], "ans": 3, "exp": "适合合规性分析。"}, {"id": 220, "ch": "BPM5", "block": "BPM", "label": "BPM5 · Verification, Validation & Certification", "source": "原题 · Closing Session", "q": "【原题】Which guideline is NOT part of the 7 process modelling guidelines (7PMG)?", "opts": ["Avoid the use of XOR-gateways", "Use verb-object activity labels", "Use one start and one end event", "Decompose a model with more than 50 elements"], "ans": 0, "exp": "7PMG 不要求避免 XOR gateway；它建议减少复杂路由但不是禁用 XOR。"}, {"id": 221, "ch": "BPM5", "block": "BPM", "label": "BPM5 · Verification, Validation & Certification", "source": "原题 · Closing Session", "q": "【原题】Which statement about designed process model quality is TRUE?", "opts": ["7PMG have a strong empirical basis related to syntactical errors and complexity.", "Semantic correctness includes avoidance of deadlocks.", "Pragmatic quality concerns understandability; pragmatic QA techniques are validation techniques.", "Semantic quality can rely on mature soundness analysis of workflow nets."], "ans": 0, "exp": "Closing Session 答案为 A。7PMG 基于模型复杂度与理解性的经验研究。"}, {"id": 222, "ch": "BPM5", "block": "BPM", "label": "BPM5 · Verification, Validation & Certification", "source": "原题 · Closing Session", "q": "【原题】Which statement about the process model is TRUE?", "opts": ["The model suffers from a deadlock, but no lack of synchronization.", "The model suffers from lack of synchronization, but no deadlock.", "The model suffers from both deadlock and lack of synchronization.", "The process model is syntactically correct."], "ans": 2, "exp": "答案为 C：同时存在 deadlock 和 lack of synchronization。"}, {"id": 223, "ch": "BPM5", "block": "BPM", "label": "BPM5 · Verification, Validation & Certification", "source": "原题 · Closing Session", "q": "【原题】Semantic quality of tenant compensation model: which statement is TRUE?", "opts": ["The model is semantically invalid because of a correctness problem: compliance check is not repeated when fees were not paid.", "The model is semantically invalid because additional fees are not modelled.", "The model is semantically invalid because compliance check is not executed after update.", "The process model is semantically invalid because it is unsound."], "ans": 0, "exp": "答案为 A。题干说明未付款后应重新评估 document compliance，模型没有重复该检查。"}, {"id": 224, "ch": "BPM5", "block": "BPM", "label": "BPM5 · Verification, Validation & Certification", "source": "原题 · Closing Session", "q": "【原题】Which statement about the parent/subprocess model is FALSE?", "opts": ["If Claim declined is triggered, all tokens are wiped off and the process instance immediately terminates.", "The subprocess is syntactically incorrect because it contains lack of synchronization.", "The parent process is syntactically incorrect because it suffers from a deadlock.", "At least one of the four start events is syntactically incorrect."], "ans": 0, "exp": "答案为 A。Claim declined 的语义不是题干说的立即全局 wipe-off。"}, {"id": 225, "ch": "BPM5", "block": "BPM", "label": "BPM5 · Verification, Validation & Certification", "source": "课件题", "q": "Process model verification 主要检查什么？", "opts": ["用于描述组织战略口号", "模型是否满足形式化语法和行为正确性，如 soundness", "只用于替代事件日志", "表示利益相关者权力矩阵"], "ans": 1, "exp": "偏技术/形式层面。"}, {"id": 226, "ch": "BPM5", "block": "BPM", "label": "BPM5 function renderStats(){const done=Object.keys(store.ans).length,right=QB.filter(q=>store.ans[q.id]===q.ans).length,wrong=done-right;document.getElementById('stats').innerHTML=statHtml([["题目总数",QB.length],["已作答",done],["答对",right],["答错",wrong],["正确率",done?Math.round(right/done*100)+'%':'-']]);let html='';['BA','BPM'].forEach(block=>{html+=`<div class="group">${block} 板块</div>`;CHAPTERS.filter(c=>c.block===block).forEach(c=>{let qs=QB.filter(q=>q.ch===c.id), dn=qs.filter(q=>store.ans[q.id]!==undefined).length;html+=`<button class="${state.chapter===c.id?'active':''}" data-ch="${c.id}"><span>${c.label}</span><span class="pill">${dn}/${qs.length}</span></button>`})});document.getElementById('chapterNav').innerHTML=html;document.querySelectorAll('#chapterNav button').forEach(b=>b.onclick=()=>selectChapter(b.dataset.ch))}
function renderSelect(){let s='<option value="ALL">全部课件 · 420题</option><optgroup label="BA">'+CHAPTERS.filter(c=>c.block==='BA').map(c=>`<option value="${c.id}">${c.label}</option>`).join('')+'</optgroup><optgroup label="BPM">'+CHAPTERS.filter(c=>c.block==='BPM').map(c=>`<option value="${c.id}">${c.label}</option>`).join('')+'</optgroup>';document.getElementById('chapterSelect').innerHTML=s;document.getElementById('chapterSelect').value=state.chapter}
function selectChapter(ch){state.chapter=ch;state.block=ch==='ALL'?state.block:QB.find(q=>q.ch===ch)?.block||'ALL';state.mode='chapter';state.ids=baseIds();state.pos=firstOpen(state.ids);setView('practice');renderQuestion()}
function setBlock(block){state.block=block;state.chapter='ALL';state.mode=block==='ALL'?'all':block;state.ids=baseIds();state.pos=firstOpen(state.ids);setView('practice');renderQuestion()}
function renderQuestion(){renderStats();renderSelect();const ids=currentIds(); if(!ids.length){document.getElementById('quiz').innerHTML='<div class="panel qbox">暂无题目。</div>';return} if(state.pos<0)state.pos=0;if(state.pos>=ids.length)state.pos=ids.length-1;const q=QB[ids[state.pos]], chosen=store.ans[q.id], done=chosen!==undefined, doneInSet=ids.filter(id=>store.ans[id]!==undefined).length;let title=state.mode==='exam'?'模拟考试':state.mode==='wrong'?'错题本':state.mode==='orig'?'原题专项':state.chapter==='ALL'?(state.block==='ALL'?'全部课件练习':state.block+' 板块练习'):labels[state.chapter];document.getElementById('modeTitle').textContent=title;document.getElementById('modeHint').textContent='按 BA/BPM 两板块、每份课件 20 题整理；Closing Session 样题和练习题已标注为原题/原练习。';document.getElementById('progText').textContent=`${state.pos+1}/${ids.length} · 已完成 ${doneInSet}`;document.getElementById('progPct').textContent=Math.round(doneInSet/ids.length*100)+'%';document.getElementById('progFill').style.width=(doneInSet/ids.length*100)+'%';document.getElementById('quiz').innerHTML=`<div class="panel qbox"><div class="qmeta"><span class="tag ${q.block==='BA'?'ba':'bpm'}">${q.block}</span><span class="tag">${q.label}</span><span class="tag ${q.source.includes('原')?'orig':''}">${q.source}</span><span class="tag">${state.pos+1} / ${ids.length}</span></div><div class="qtext">${q.q}</div><div class="opts">${q.opts.map((o,i)=>`<label class="opt ${done&&i===q.ans?'correct':''} ${done&&i===chosen&&i!==q.ans?'wrong':''}"><input type="radio" name="q" value="${i}" ${chosen===i?'checked':''}> <span>${String.fromCharCode(65+i)}. ${o}</span></label>`).join('')}</div><div class="exp ${done?'show':''}"><b>答案：${String.fromCharCode(65+q.ans)}</b><br>${q.exp}</div><div class="actions"><button id="prev">上一题</button><button id="next">下一题</button><button id="clearOne">清除此题</button></div></div>`;document.querySelectorAll('input[name=q]').forEach(inp=>inp.onchange=()=>{store.ans[q.id]=+inp.value;save();renderQuestion()});document.getElementById('prev').onclick=()=>{state.pos--;renderQuestion()};document.getElementById('next').onclick=()=>{if(state.pos<ids.length-1)state.pos++;else showScore(ids);renderQuestion()};document.getElementById('clearOne').onclick=()=>{delete store.ans[q.id];save();renderQuestion()}}
function showScore(ids){const done=ids.filter(id=>store.ans[id]!==undefined),right=done.filter(id=>store.ans[id]===QB[id].ans).length;const box=document.getElementById('score');box.className='panel score show';box.innerHTML=`<b>${done.length?Math.round(right/done.length*100):0}%</b><span>本组已答 ${done.length} 题，答对 ${right} 题。</span><br><button style="margin-top:12px" onclick="document.getElementById('score').className='panel score'">收起结果</button>`}
function cleanPoint(q){return q.q.replace(/^【[^】]+】/,'').replace(/[？?]$/,'')}
function chapterFormulas(ch){return FORMULAS.filter(f=>f[0]===ch)}
function formulaCards(ch){let fs=chapterFormulas(ch);return fs.length?`<details open><summary>公式 / 规则速记 <small>${fs.length}</small></summary><div class="formula-list">${fs.map(f=>`<div class="formula-chip"><b>${f[1]}</b><br><code>${f[2]}</code><p>${f[3]}</p></div>`).join('')}</div></details>`:''}
function renderChapterNode(c){let qs=QB.filter(q=>q.ch===c.id), originals=qs.filter(q=>q.source.includes('原'));return `<details class="chapter-node"><summary>${c.label} <small>${qs.length}题${chapterFormulas(c.id).length?` · ${chapterFormulas(c.id).length}公式/规则`:''}${originals.length?` · ${originals.length}原题/练习`:''}</small></summary>${formulaCards(c.id)}<details open><summary>刷题小知识点 <small>${qs.length}</small></summary><ol class="knowledge-list">${qs.map(q=>`<li><b>${cleanPoint(q)}</b><small>${q.source}</small><em>${q.exp}</em></li>`).join('')}</ol></details>${originals.length?`<details><summary>原题 / 原练习定位 <small>${originals.length}</small></summary><ul class="knowledge-list">${originals.map(q=>`<li><b>${cleanPoint(q)}</b><em>${q.exp}</em></li>`).join('')}</ul></details>`:''}</details>`}
function toggleMap(open){document.querySelectorAll('#mapGrid details').forEach(d=>d.open=open)}
function renderMap(){document.getElementById('mapGrid').innerHTML=`<div class="map-tools"><button onclick="toggleMap(true)">全部展开</button><button onclick="toggleMap(false)">全部收起</button></div>${['BA','BPM'].map(block=>`<details class="node block-node" open><summary>${block} 板块 <small>${CHAPTERS.filter(c=>c.block===block).length}份课件 · ${QB.filter(q=>q.block===block).length}题</small></summary>${CHAPTERS.filter(c=>c.block===block).map(renderChapterNode).join('')}</details>`).join('')}`}
let flashIndex=0,revealed=false;function renderFlash(){document.getElementById('flashList').innerHTML=FLASHCARDS.map((c,i)=>`<button class="${i===flashIndex?'primary':''}" data-f="${i}">${c[0]}</button>`).join('');document.querySelectorAll('#flashList button').forEach(b=>b.onclick=()=>{flashIndex=+b.dataset.f;revealed=false;renderFlash()});let c=FLASHCARDS[flashIndex];document.getElementById('flashCard').innerHTML=`<div class="label">Flashcard ${flashIndex+1}/${FLASHCARDS.length}</div><h3>${c[0]}</h3><p class="${revealed?'':'hidden'}">${c[1]}</p><div class="actions" style="width:100%;max-width:560px"><button onclick="flashIndex=(flashIndex+FLASHCARDS.length-1)%FLASHCARDS.length;revealed=false;renderFlash()">上一张</button><button class="primary" onclick="revealed=!revealed;renderFlash()">${revealed?'隐藏':'显示答案'}</button><button onclick="flashIndex=(flashIndex+1)%FLASHCARDS.length;revealed=false;renderFlash()">下一张</button></div>`}
function renderFormula(){document.getElementById('formula').innerHTML=FORMULAS.map(f=>`<article><h3>${f[1]}</h3><p><small>${labels[f[0]]||f[0]}</small></p><p><code>${f[2]}</code></p><p>${f[3]}</p></article>`).join('')}
document.querySelectorAll('.tabs [data-view]').forEach(b=>b.onclick=()=>setView(b.dataset.view));document.getElementById('chapterSelect').onchange=e=>selectChapter(e.target.value);document.getElementById('allBtn').onclick=()=>setBlock('ALL');document.getElementById('baBtn').onclick=()=>setBlock('BA');document.getElementById('bpmBtn').onclick=()=>setBlock('BPM');document.getElementById('examBtn').onclick=()=>{state.mode='exam';state.chapter='ALL';state.block='ALL';state.ids=shuffle(QB.map(q=>q.id)).slice(0,30);state.pos=0;setView('practice');renderQuestion()};document.getElementById('origBtn').onclick=()=>{state.mode='orig';state.chapter='ALL';state.block='ALL';state.ids=QB.filter(q=>q.source.includes('原')).map(q=>q.id);state.pos=0;setView('practice');renderQuestion()};document.getElementById('wrongBtn').onclick=()=>{state.mode='wrong';state.ids=QB.filter(q=>store.ans[q.id]!==undefined&&store.ans[q.id]!==q.ans).map(q=>q.id);state.pos=0;setView('practice');renderQuestion()};document.getElementById('resetBtn').onclick=()=>{if(confirm('确定清空全部答题进度？')){store={ans:{}};save();setBlock('ALL')}};renderMap();renderFlash();renderFormula();setBlock('ALL');
</script></body></html>
